# =============================================
# Perfil: PRODUCCION (prod)
# =============================================
# IMPORTANTE: No hardcodear credenciales aqui.
# Usar variables de entorno o un secrets manager.

ssh.host=${SSH_HOST}
ssh.port=${SSH_PORT:22}
ssh.user=${SSH_USER}
ssh.password=${SSH_PASSWORD}
ssh.scripts.path=${SSH_SCRIPTS_PATH:/home/admiddle/}

##########CONEXIONES GE###########
spring.datasource.ge.jdbc-url=${GE_JDBC_URL}
spring.datasource.ge.username=${GE_USERNAME}
spring.datasource.ge.password=${GE_PASSWORD}
spring.datasource.ge.driver-class-name=oracle.jdbc.OracleDriver

# Base de datos de produccion (configurar segun motor real)
spring.h2.console.enabled=false
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

# Solo errores en produccion
logging.level.com.fybeca=WARN
logging.level.org.springframework=ERROR
